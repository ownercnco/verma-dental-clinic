<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Verification -->
    <meta
      name="google-site-verification"
      content="rCTuciFlsNWFyU4vzz_07ocM81aOAm4iCjauZ4oLT8s"
    />

    <!-- SEO -->
    <title>Sample Dental | Professional Dental Care Clinic</title>

    <meta
      name="description"
      content="Sample Dental provides professional dental care including cleaning, implants, braces, cosmetic dentistry, root canals, and emergency dental services."
    />

    <meta
      name="keywords"
      content="dentist, dental clinic, braces, implants, root canal, teeth cleaning, cosmetic dentistry"
    />

    <meta name="robots" content="index, follow" />

    <link rel="canonical" href="https://yourdomain.com/" />

    <!-- Theme -->
    <meta name="theme-color" content="#ffffff" />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Sample Dental | Professional Dental Care"
    />

    <meta
      property="og:description"
      content="Modern dental clinic offering expert dental care, cosmetic dentistry, implants, and emergency services."
    />

    <meta property="og:type" content="website" />

    <meta property="og:url" content="https://yourdomain.com/" />

    <meta
      property="og:image"
      content="https://yourdomain.com/og-image.jpg"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="Sample Dental | Professional Dental Care"
    />

    <meta
      name="twitter:description"
      content="Expert dental clinic providing implants, braces, cleaning, and cosmetic dentistry."
    />

    <meta
      name="twitter:image"
      content="https://yourdomain.com/og-image.jpg"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Styles -->
    <link rel="stylesheet" href="/assets/styles-CP9h9AN9.css" />
  </head>

  <body>
    <div id="root"></div>

    <!-- React Entry -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
